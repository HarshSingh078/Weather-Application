<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="weatherapp">
      <hr />
      <h1>Weather App</h1>
       
      <div class="search-box">
          <input type="text" name="search" placeholder="Search your city" />
          <button>Search</button>
        </div>

      <div class="current">
        <p>☀️</p>
        <h1>Delhi</h1>
        <p>30°C</p>
        <p>Sunny</p>
        <p>Feels like 33°C</p>
      </div>

      <hr />
      <div class="details">
        <div class="detail">
          <span>💧 Humidity</span>
          <p>65%</p>
        </div>

        <div class="detail">
          <span>🌬 Wind</span>
          <p>12 km/h</p>
        </div>

        <div class="detail">
          <span>📈 Pressure</span>
          <p>1013 hPa</p>
        </div>

        <div class="detail">
          <span>👁 Visibility</span>
          <p>10 km</p>
        </div>

        <div class="detail">
          <span>🌅 Sunrise</span>
          <p>5:32 AM</p>
        </div>

        <div class="detail">
          <span>🌇 Sunset</span>
          <p>7:18 PM</p>
        </div>

        <div class="detail">
          <span>☀ UV Index</span>
          <p>6</p>
        </div>

        <div class="detail">
          <span>☁ Clouds</span>
          <p>15%</p>
        </div>
      </div>
      <hr />

      <div class="forecast">
      <div class="forecast-card">
        <p>Mon</p>
        <p>☀️</p>
        <p>31°/25°</p>
      </div>
      <div class="forecast-card">
        <p>Tue</p>
        <p>☀️</p>
        <p>31°/25°</p>
      </div>
      <div class="forecast-card">
        <p>Wed</p>
        <p>☀️</p>
        <p>31°/25°</p>
      </div>
      <div class="forecast-card">
        <p>Thu</p>
        <p>☀️</p>
        <p>31°/25°</p>
      </div>
      <div class="forecast-card">
        <p>Fri</p>
        <p>☀️</p>
        <p>31°/25°</p>
      </div>
      </div>
      <hr />
    </div>
    <script src="script.js"></script>
  </body>
</html>
