<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="weatherapp">
      <hr />
      <h1>Weather App</h1>
       
      <div class="search-box">
          <input type="text" name="search" placeholder="Search your city" />
          <button>Search</button>
        </div>

      <div class="current">
         <img id="current-weather-icon" alt="Current Weather">
    <h1 id="city-name">Delhi</h1>
        <p id="temperature">30°C</p>
        <p id="weather">Sunny</p>
        <p id="feels-like">Feels like 33°C</p>
      </div>

      <hr />
      <div class="details">
        <div class="detail">
          <span>💧 Humidity</span>
          <p id="humidity">65%</p>
        </div>

        <div class="detail">
          <span>🌬 Wind</span>
          <p id="wind">12 km/h</p>
        </div>

        <div class="detail">
          <span>📈 Pressure</span>
          <p id="pressure">1013 hPa</p>
        </div>

        <div class="detail">
          <span>👁 Visibility</span>
          <p id="visibility">10 km</p>
        </div>

        <div class="detail">
          <span>🌅 Sunrise</span>
          <p id="sunrise">5:32 AM</p>
        </div>

        <div class="detail">
          <span>🌇 Sunset</span>
          <p id="sunset">7:18 PM</p>
        </div>

        <div class="detail">
          <span>☀ UV Index</span>
          <p id="uv">6</p>
        </div>

        <div class="detail">
          <span>☁ Clouds</span>
          <p id="clouds">15%</p>
        </div>
      </div>
      <hr />

      <div class="forecast">
      <div class="forecast-card">
        <p class="forecast-day">Mon</p>
        <img class="forecast-icon" alt="Weather Icon">
        <p class="forecast-temp">31°/25°</p>
      </div>
      <div class="forecast-card">
        <p class="forecast-day">Tue</p>
        <img class="forecast-icon" alt="Weather Icon">
        <p class="forecast-temp">31°/25°</p>
      </div>
      <div class="forecast-card">
        <p class="forecast-day">Wed</p>
        <img class="forecast-icon" alt="Weather Icon">
        <p class="forecast-temp">31°/25°</p>
      </div>
      <div class="forecast-card">
        <p class="forecast-day">Thu</p>
        <img class="forecast-icon" alt="Weather Icon">
        <p class="forecast-temp">31°/25°</p>
      </div>
      <div class="forecast-card">
        <p class="forecast-day">Fri</p>
        <img class="forecast-icon" alt="Weather Icon">
        <p class="forecast-temp">31°/25°</p>
      </div>
      </div>
      <hr />
    </div>
    <script src="script.js"></script>
  </body>
</html>
